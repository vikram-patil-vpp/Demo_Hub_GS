<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DemoHub — Automation Demos by Vikram Patil</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f7f4ef;
  --surface:   #ffffff;
  --surface2:  #f0ece4;
  --border:    #e0d9ce;
  --text:      #1c1916;
  --muted:     #6b6460;
  --accent:    #1a4731;
  --accent2:   #b8943a;
  --accent-lt: #e8f0eb;
  --shadow:    rgba(28,25,22,0.09);
  --nav-h:     68px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Epilogue', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.65;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 256px;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px;
  background: rgba(247,244,239,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 600;
  color: var(--text); cursor: pointer;
}
.nav-logo span { color: var(--accent2); }
.nav-right { display: flex; align-items: center; gap: 8px; }
.nav-pill {
  font-size: 13px; font-weight: 500; color: var(--muted);
  padding: 7px 16px; border-radius: 100px;
  border: none; background: none; cursor: pointer;
  font-family: 'Epilogue', sans-serif;
  transition: color 0.2s, background 0.2s; text-decoration: none;
}
.nav-pill:hover { color: var(--text); background: var(--surface2); }
.nav-btn {
  font-size: 13px; font-weight: 600; color: #fff;
  background: var(--accent); padding: 8px 20px;
  border-radius: 100px; border: none; cursor: pointer;
  font-family: 'Epilogue', sans-serif;
  transition: opacity 0.2s, transform 0.2s; text-decoration: none;
}
.nav-btn:hover { opacity: 0.88; transform: translateY(-1px); }

/* PAGES */
.page { display: none; min-height: 100vh; }
.page.active { display: block; }

/* HERO */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column; justify-content: center;
  padding: calc(var(--nav-h) + 72px) 48px 80px;
  max-width: 1100px; margin: 0 auto;
  position: relative; z-index: 1;
}
.hero::before {
  content: '';
  position: fixed;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(184,148,58,0.1) 0%, transparent 70%);
  top: 5%; right: -100px; pointer-events: none;
  animation: float 9s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }

.hero-tag {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--accent);
  margin-bottom: 28px;
  opacity: 0; animation: reveal 0.7s 0.1s forwards;
}
.hero-tag::before { content:''; width:24px; height:1.5px; background:var(--accent2); display:block; }

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(40px, 5.5vw, 68px);
  line-height: 1.1; letter-spacing: -1px; font-weight: 600;
  max-width: 760px; margin-bottom: 24px;
  opacity: 0; animation: reveal 0.8s 0.25s forwards;
}
.hero h1 em { font-style: italic; color: var(--accent2); }

.hero-sub {
  font-size: 17px; font-weight: 300; color: var(--muted);
  max-width: 500px; line-height: 1.8; margin-bottom: 44px;
  opacity: 0; animation: reveal 0.8s 0.4s forwards;
}

.hero-actions {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  opacity: 0; animation: reveal 0.8s 0.55s forwards;
}

.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--accent); color: #fff;
  padding: 14px 28px; border-radius: 100px;
  font-family: 'Epilogue', sans-serif; font-size: 14px; font-weight: 600;
  text-decoration: none; border: none; cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(26,71,49,0.22);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(26,71,49,0.28); }

.btn-ghost {
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent; color: var(--text);
  padding: 13px 24px; border-radius: 100px;
  font-family: 'Epilogue', sans-serif; font-size: 14px; font-weight: 500;
  text-decoration: none; border: 1.5px solid var(--border); cursor: pointer;
  transition: all 0.25s;
}
.btn-ghost:hover { border-color: var(--accent2); color: var(--accent); transform: translateY(-2px); }

.trust-bar {
  display: flex; align-items: center; gap: 32px;
  margin-top: 64px; flex-wrap: wrap;
  opacity: 0; animation: reveal 0.8s 0.7s forwards;
}
.trust-divider { width:1px; height:32px; background:var(--border); }
.trust-item { display: flex; flex-direction: column; }
.trust-val { font-family:'Playfair Display',serif; font-size:26px; font-weight:600; color:var(--text); line-height:1; }
.trust-label { font-size:11px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-top:4px; }

/* SECTION */
.section { padding: 96px 48px; max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
.section-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--accent2); margin-bottom: 14px;
}
.section-eyebrow::before { content:''; width:20px; height:1.5px; background:var(--accent2); }
.section-title {
  font-family:'Playfair Display',serif;
  font-size: clamp(28px,4vw,44px); font-weight:600;
  letter-spacing:-0.5px; line-height:1.15; margin-bottom:14px;
}
.section-sub { font-size:16px; font-weight:300; color:var(--muted); max-width:480px; line-height:1.8; margin-bottom:52px; }

/* DEMO CARDS */
.demos-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }

.demo-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px; padding: 30px 26px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
}
.demo-card::before {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, transparent 40%, rgba(184,148,58,0.05) 100%);
  opacity:0; transition:opacity 0.4s; pointer-events:none;
}
.demo-card:hover::before { opacity:1; }
.demo-card:hover { transform:translateY(-6px); box-shadow:0 20px 48px var(--shadow); border-color:rgba(184,148,58,0.35); }
.demo-card::after {
  content:''; position:absolute; top:0; left:0;
  width:3px; height:0;
  background: linear-gradient(to bottom, var(--accent2), var(--accent));
  border-radius:0 0 3px 3px; transition:height 0.35s ease;
}
.demo-card:hover::after { height:100%; }

.demo-icon-wrap {
  width:50px; height:50px; background:var(--surface2);
  border-radius:14px; display:flex; align-items:center; justify-content:center;
  font-size:22px; margin-bottom:18px;
  transition:background 0.3s, transform 0.3s;
}
.demo-card:hover .demo-icon-wrap { background:var(--accent-lt); transform:scale(1.08); }

.demo-card-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:600; margin-bottom:9px; line-height:1.25; }
.demo-card-desc { font-size:13.5px; font-weight:300; color:var(--muted); line-height:1.65; margin-bottom:20px; }

.demo-card-footer { display:flex; align-items:center; justify-content:space-between; }
.demo-card-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.demo-arrow {
  width:32px; height:32px; border-radius:50%;
  background:var(--surface2);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; color:var(--muted);
  transition:background 0.3s, color 0.3s, transform 0.3s; flex-shrink:0;
}
.demo-card:hover .demo-arrow { background:var(--accent); color:#fff; transform:translateX(3px); }

/* HOW IT WORKS */
.how-grid {
  display:grid; grid-template-columns:repeat(4,1fr);
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; overflow:hidden;
}
.how-step { padding:34px 26px; border-right:1px solid var(--border); transition:background 0.3s; }
.how-step:last-child { border-right:none; }
.how-step:hover { background:var(--surface2); }
.how-num { font-family:'Playfair Display',serif; font-size:40px; font-weight:600; color:var(--border); line-height:1; margin-bottom:14px; transition:color 0.3s; }
.how-step:hover .how-num { color:var(--accent2); }
.how-title { font-size:14px; font-weight:600; margin-bottom:7px; }
.how-desc { font-size:13px; font-weight:300; color:var(--muted); line-height:1.65; }

/* ZERO COST BAND */
.zero-band {
  margin: 0 48px;
  background: var(--accent); border-radius:24px;
  padding: 56px 64px;
  display:flex; align-items:center; justify-content:space-between;
  gap:32px; flex-wrap:wrap; position:relative; overflow:hidden; z-index:1;
}
.zero-band::before {
  content:''; position:absolute;
  width:400px; height:400px; border-radius:50%;
  background:rgba(184,148,58,0.1);
  top:-100px; right:-80px; pointer-events:none;
}
.zero-band-text h2 {
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,3vw,36px); color:#fff; font-weight:600;
  letter-spacing:-0.3px; line-height:1.2; margin-bottom:12px;
}
.zero-band-text p { font-size:15px; font-weight:300; color:rgba(255,255,255,0.75); max-width:420px; line-height:1.8; }
.zero-band-actions { display:flex; gap:12px; flex-wrap:wrap; flex-shrink:0; }
.btn-light {
  display:inline-flex; align-items:center; gap:8px;
  background:#fff; color:var(--accent);
  padding:13px 26px; border-radius:100px;
  font-family:'Epilogue',sans-serif; font-size:14px; font-weight:600;
  text-decoration:none; border:none; cursor:pointer; transition:all 0.25s;
}
.btn-light:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.15); }
.btn-outline-light {
  display:inline-flex; align-items:center; gap:8px;
  background:transparent; color:rgba(255,255,255,0.9);
  padding:12px 24px; border-radius:100px;
  font-family:'Epilogue',sans-serif; font-size:14px; font-weight:500;
  text-decoration:none; border:1.5px solid rgba(255,255,255,0.4); cursor:pointer;
  transition:all 0.25s;
}
.btn-outline-light:hover { border-color:rgba(255,255,255,0.8); color:#fff; transform:translateY(-2px); }

/* PILLARS */
.pillars-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
.pillar {
  background:var(--surface); border:1px solid var(--border);
  border-radius:18px; padding:30px;
  display:flex; gap:20px;
  transition:transform 0.25s, box-shadow 0.25s;
}
.pillar:hover { transform:translateY(-4px); box-shadow:0 16px 40px var(--shadow); }
.pillar-num {
  width:48px; height:48px; flex-shrink:0;
  background:var(--surface2); border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-size:20px; font-weight:600;
  color:var(--accent2); transition:background 0.3s;
}
.pillar:hover .pillar-num { background:var(--accent-lt); }
.pillar-body h4 { font-size:15px; font-weight:600; margin-bottom:6px; }
.pillar-body p { font-size:13.5px; font-weight:300; color:var(--muted); line-height:1.7; }

/* FOOTER */
footer {
  border-top:1px solid var(--border);
  padding:48px 48px 36px;
  max-width:1100px; margin:80px auto 0;
  position:relative; z-index:1;
}
.footer-inner { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:24px; }
.footer-author { display:flex; align-items:center; gap:16px; }
.author-avatar {
  width:44px; height:44px; border-radius:50%;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display',serif; font-size:18px; color:#fff; font-weight:600;
}
.author-info h4 { font-size:14px; font-weight:600; }
.author-info p { font-size:12.5px; color:var(--muted); }
.footer-links { display:flex; gap:24px; align-items:center; }
.footer-link { font-size:13px; color:var(--muted); text-decoration:none; transition:color 0.2s; background:none; border:none; cursor:pointer; font-family:'Epilogue',sans-serif; }
.footer-link:hover { color:var(--accent); }
.footer-copy { margin-top:32px; padding-top:24px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); text-align:center; }

/* DEMO PAGE */
.demo-page-wrap { padding: calc(var(--nav-h) + 48px) 48px 80px; max-width:860px; margin:0 auto; position:relative; z-index:1; }

.back-btn {
  display:inline-flex; align-items:center; gap:6px;
  font-size:13px; color:var(--muted); cursor:pointer;
  background:none; border:none; font-family:'Epilogue',sans-serif;
  margin-bottom:36px; transition:color 0.2s; padding:0;
}
.back-btn:hover { color:var(--accent); }

.demo-page-icon {
  width:56px; height:56px; background:var(--surface2);
  border-radius:16px; display:flex; align-items:center; justify-content:center;
  font-size:26px; margin-bottom:18px;
}
.demo-page-header h1 { font-family:'Playfair Display',serif; font-size:clamp(24px,4vw,36px); font-weight:600; letter-spacing:-0.4px; margin-bottom:10px; }
.demo-page-header p { font-size:15px; font-weight:300; color:var(--muted); max-width:540px; line-height:1.8; margin-bottom:28px; }

.meta-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:32px; }
.meta-pill {
  display:flex; align-items:center; gap:6px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:100px; padding:5px 13px;
  font-size:12px; color:var(--muted); font-weight:500;
}
.meta-pill::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }

/* FORM */
.demo-form {
  background:var(--surface); border:1px solid var(--border);
  border-radius:18px; padding:32px; margin-bottom:28px;
}
.form-row { margin-bottom:20px; }
.form-row label { display:block; font-size:13px; font-weight:600; color:var(--text); margin-bottom:7px; }
.form-row input, .form-row select, .form-row textarea {
  width:100%; padding:11px 14px;
  border:1px solid var(--border); border-radius:10px;
  font-family:'Epilogue',sans-serif; font-size:14px;
  background:var(--bg); color:var(--text);
  transition:border 0.18s, background 0.18s; outline:none;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color:var(--accent); background:#fff; }
.form-row textarea { resize:vertical; min-height:90px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-hint { font-size:12px; color:var(--muted); margin-top:5px; font-weight:300; }

.generate-btn {
  width:100%; padding:14px;
  background:var(--accent); color:#fff;
  border:none; border-radius:100px;
  font-family:'Epilogue',sans-serif; font-size:15px; font-weight:600;
  cursor:pointer; transition:all 0.25s; margin-top:8px;
  box-shadow:0 4px 16px rgba(26,71,49,0.2);
}
.generate-btn:hover { opacity:0.9; transform:translateY(-1px); }
.generate-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

/* RESULT */
.result-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:18px; padding:36px;
  display:none;
}
.result-box.show { display:block; animation:reveal 0.4s ease forwards; }

.result-header {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--border);
}
.result-title { font-family:'Playfair Display',serif; font-size:22px; font-weight:600; }
.result-sub { font-size:12.5px; color:var(--muted); margin-top:4px; }
.result-badge {
  background:var(--accent-lt); color:var(--accent);
  font-size:11px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
  padding:4px 12px; border-radius:100px; white-space:nowrap;
}

.metrics-row { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
.metric-card { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:18px; text-align:center; }
.metric-val { font-family:'Playfair Display',serif; font-size:28px; color:var(--accent); line-height:1; }
.metric-lbl { font-size:11px; color:var(--muted); margin-top:5px; text-transform:uppercase; letter-spacing:0.5px; font-weight:500; }

.result-section { margin-bottom:24px; }
.result-section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); margin-bottom:12px; }

.result-table { width:100%; border-collapse:collapse; font-size:13.5px; }
.result-table th { text-align:left; padding:9px 12px; background:var(--bg); color:var(--muted); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.result-table td { padding:11px 12px; border-top:1px solid var(--border); }
.result-table tr:hover td { background:var(--bg); }

.result-narrative { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:20px 22px; font-size:14px; font-weight:300; color:var(--text); line-height:1.8; margin-bottom:20px; }
.result-narrative p { margin-bottom:12px; }
.result-narrative p:last-child { margin-bottom:0; }

.info-note {
  display:flex; align-items:flex-start; gap:10px;
  background:var(--accent-lt); border:1px solid #c8dfd0;
  border-radius:10px; padding:13px 16px;
  font-size:13px; color:var(--accent); margin-top:20px; line-height:1.6;
}

/* CTA BLOCK */
.demo-cta {
  background:var(--surface); border:1px solid var(--border);
  border-radius:18px; padding:32px;
  text-align:center; margin-top:28px; display:none;
}
.demo-cta.show { display:block; animation:reveal 0.4s ease forwards; }
.demo-cta h3 { font-family:'Playfair Display',serif; font-size:22px; margin-bottom:8px; }
.demo-cta p { font-size:14px; font-weight:300; color:var(--muted); margin-bottom:24px; line-height:1.7; }
.demo-cta-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }

/* REQUIREMENT MODAL */
.req-overlay {
  position:fixed; inset:0; z-index:300;
  background:rgba(28,25,22,0.5); backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center; padding:24px;
}
.req-overlay.show { display:flex; animation:fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.req-modal {
  background:var(--surface); border-radius:20px;
  padding:40px; width:100%; max-width:520px;
  max-height:90vh; overflow-y:auto;
  position:relative; animation:slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

.req-modal-close {
  position:absolute; top:16px; right:16px;
  width:32px; height:32px; border-radius:50%;
  background:var(--surface2); border:none; cursor:pointer;
  font-size:16px; display:flex; align-items:center; justify-content:center;
  color:var(--muted); transition:background 0.2s;
}
.req-modal-close:hover { background:var(--border); }
.req-modal h2 { font-family:'Playfair Display',serif; font-size:24px; margin-bottom:6px; }
.req-modal .sub { font-size:13.5px; font-weight:300; color:var(--muted); margin-bottom:28px; line-height:1.65; }

.req-success { display:none; text-align:center; padding:20px 0; }
.req-success.show { display:block; animation:reveal 0.4s ease forwards; }
.req-success-icon { font-size:40px; margin-bottom:16px; }
.req-success h3 { font-family:'Playfair Display',serif; font-size:20px; margin-bottom:8px; }
.req-success p
